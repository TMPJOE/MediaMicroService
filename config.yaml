# Media Service Configuration
server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s

logging:
  level: "info"
  format: "json"

rate_limit:
  enabled: true
  requests_per_second: 100
  burst: 200

circuit_breaker:
  enabled: true
  max_failures: 5
  timeout: 30s

# Health check configuration
health:
  path: "/health"
  ready_path: "/ready"

# MinIO Service configuration (HTTP API, not direct SDK)
minio_service:
  url: "http://minio-service:8080"  # Base URL of the separate MinIO service
  bucket: "media"                     # Default bucket name
