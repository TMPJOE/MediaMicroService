# Media Service Configuration
server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s

logging:
  level: "info"
  format: "json"

rate_limit:
  enabled: true
  requests_per_second: 100
  burst: 200

circuit_breaker:
  enabled: true
  max_failures: 5
  timeout: 30s

# Health check configuration
health:
  path: "/health"
  ready_path: "/ready"

# JWT configuration — this service only validates tokens (public key).
# Tokens are issued by the UsersMicroService using the matching private key.
jwt:
  issuer: "users-service"

# MinIO Service configuration (HTTP API, not direct SDK)
minio_service:
  url: "http://minio-service:8080" # Base URL of the separate MinIO service
  bucket: "media" # Default bucket name
